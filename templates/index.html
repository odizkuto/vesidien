<!DOCTYPE html>
<html>
<head>
    <title>Lịch Cúp Điện</title>
    <style>
        .ket-qua-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        .red-text { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Danh sách lịch cúp điện</h2>
    {% for item in lich_cup_dien %}
    <div class="ket-qua-card">
        <p><strong>Điện lực:</strong> {{ item.dien_luc }}</p>
        <p><strong>Ngày:</strong> <span class="red-text">{{ item.ngay }}</span></p>
        <p><strong>Thời gian:</strong> {{ item.thoi_gian }}</p>
        <p><strong>Khu vực:</strong> {{ item.khu_vuc }}</p>
        <p><strong>Lý do:</strong> {{ item.ly_do }}</p>
    </div>
    {% endfor %}
</body>
</html>
