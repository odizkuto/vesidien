<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Lịch Cúp Điện Phú Tân</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 20px; }
        button { 
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            color: white; border: none; padding: 15px 30px; border-radius: 12px; 
            cursor: pointer; font-size: 16px; font-weight: bold; width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .result-box { margin-top: 25px; padding: 20px; background: #f8fafc; border-radius: 12px; text-align: left; font-size: 14px; color: #475569; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚡ Tra cứu Lịch Cúp Điện Huyện Phú Tân</h2>
        <form method="POST" id="searchForm">
            <button type="submit" id="btn">Bấm để kiểm tra</button>
        </form>
        <div class="result-box">
            <h3>Kết quả:</h3>
            <p>{{ ket_qua|safe }}</p>
        </div>
    </div>
    <script>
        document.getElementById('searchForm').onsubmit = () => {
            const btn = document.getElementById('btn');
            btn.innerText = "Đang lấy dữ liệu...";
            btn.style.opacity = "0.7";
        };
    </script>
</body>
</html>
